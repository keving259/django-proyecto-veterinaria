<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap");
        :root {
        --white-color: hsl(0,0%,100%);
        --black-color: hsl(0, 0% , 0%);
        --body-font:   "Poppins", sans-serif; 
        --h1-font-size: 1.75rem;
        --normal-font-size: 1rem;
        --small-font-size: .813rem;
        --font-medium: 500; 
        }

        *{
            box-sizing: border-box;
            padding: 0;
            margin: 0;
        }

        body,
        input,
        button {
            font-size:  var(--normal-font-size);
            font-family:  var(--body-font);
        }

        body {
            color:  var(--white-color);
        }

        input,
        button {
            border: none;
            outline: none;
        }

        a {
            text-decoration: none;
        }
            img {
            max-width: 100%;
            height: auto;
            }

            .login {
            position: relative;
            height: 100vh;
            display: grid;
            align-items: center;
            }

            .login__img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            }

            .login__logo {
                width: 150px;
                height: auto;
                display: block;
                margin: 0 auto .5rem auto;
                border-radius: 60%;
            }

            .login__form {
            position: relative;
            background-color: hsla(0, 0%, 10%, 0.1);
            border: 2px solid var(--white-color);
            margin-inline: 1.5rem;
            padding: 2.5rem 1.5rem;
            border-radius: 1rem;
            backdrop-filter: blur(8px);
            }

            .login__title {
            text-align: center;
            font-size: var(--h1-font-size);
            font-weight: var(--font-medium);
            margin-bottom: 2rem;
            }
            .login__content, .login__box {
            display: grid;
            }

            .login__content {
            row-gap: 1.75rem;
            margin-bottom: 1.5rem;
            }

            .login__box {
            grid-template-columns: max-content 1fr;
            align-items: center;
            column-gap: 0.75rem;
            border-bottom: 2px solid var(--white-color);
            }
            .login__icon, .login__eye {
            font-size: 1.25rem;
            }
            .login__input {
            width: 100%;
            padding-block: 0.8rem;
            background: none;
            color:  var(--white-color);
            position: relative;
            z-index: 1;
            }
            .login__box-input {
            position: relative;
            }
        
            .login__label {
            position: absolute;
            left: 0;
            top: 13px;
            font-weight: var(--font-medium);
            transition: top 0.3s, font-size 0.3s;
            }
            .login__eye {
            position: absolute;
            right: 0;
            top: 18px;
            z-index: 10;
            cursor: pointer;
            }
            .login__box:nth-child(2) input {
            padding-right: 1.8rem;
            }

            .login__check, .login__check-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            }
            .login__check {
            margin-bottom: 1.5rem;
            }
            .login__check-label, .login__forgot, .login__register {
                font-size: var(--small-font-size);
            }
            .login__check-group {
                column-gap: 0.5rem;
            }
            .login__check-input {
                width: 16px;
                height: 16px;
            }
            .login__forgot {
                color: var(--white-color);
                }
                .login__forgot:hover {
                text-decoration: underline;
                }
                .login__button {
                width: 100%;
                padding: 1rem;
                border-radius: 0.5rem;
                background-color: var(--white-color);
                font-weight: var(--font-medium);
                cursor: pointer;
                margin-bottom: 2rem;
                }
                .login__register  {
                    text-align: center ;
                }

                .login__register a {
                color: var(--white-color);
                font-weight: var(--font-medium);
                }
                .login__register a:hover {
                text-decoration: underline;

                }

                .login__input:focus + .login__label,
                .login__input:not(:placeholder-shown) + .login__label {
                top: -12px;
                font-size: var(--small-font-size);
                }

                .login__input:not(:placeholder-shown) .login__input:not(:focus) + .login__label {
                top: -12px;
                font-size: var(--small-font-size);
                }

                @media screen and (min-width: 576px) {
                .login {
                    justify-content: center;
                }
                .login__form {
                    width: 432px;
                    padding: 4rem 3rem 3.5rem;
                    border-radius: 1.5rem;
                }
                .login__title {
                    font-size: 2rem;
                }
                .login__eye {
                    top: 22px;
                }
                .login__logo {
                    width: 180px;
                }
                }
    </style>
    </head>
    <body>
        <div class="login">
            {% load static %}

            <img src="{% static 'img/login-bg.jpg' %}"
                alt="login"
                class="login__img">

            <form method="POST" action="{% url 'login' %}" class="login__form">
                {% csrf_token %}

                <img src="{% static "img/logo.png" %}" alt="Logo" class="login__logo">

            <h1 class="login__title">Inicio de Sesión</h1>

            <div class="login__content">
                <div class="login__box">
                <i class="bx bx-user"></i>
                
                
                <div class="login__box-input">
                    <input type="text" required class="login__input" id="login-user" placeholder=" " name='username'>
                    <label for="login-user" class="login__label">Nombre de Usuario</label>
                </div>
                </div>

                <div class="login__box">
                
                <i class="bx bx-lock-alt"></i>

                <div class="login__box-input">
                    <input type="password" required class="login__input" id="login-pass" placeholder=" " name='password'>
                    <label for="login-pass" class="login__label">Contraseña</label>
                    <i class="ri-eye-off-line login__eye" id="login-eye"></i>
                </div>
                </div>
            </div>

            <div class="login__check">
                <div class="login__check-group">
                <input type="checkbox" class="login__check-input" id="remember-me">
                <label for="remember-me" class="login__check-label">Recordarme</label>
                </div>

                <a href="#" class="login__forgot">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="login__button">Login</button>

            <p class="login__register">
                ¿No tienes una cuenta? <a href="#" style='color: #48E'>Regístrate</a>
            </p>
            </form>
        </div>
        <script>
            const showHiddenPass = (loginPass, loginEye) => {
            const input = document.getElementById(loginPass),
            iconEye = document.getElementById(loginEye)

            if(input && iconEye){
                iconEye.addEventListener('click', () => {
                    if(input.type === 'password'){
                        input.type = 'text'
                        iconEye.classList.add('ri-eye-line')
                        iconEye.classList.remove('ri-eye-off-line')
                    } else {
                        input.type = 'password'
                        iconEye.classList.remove('ri-eye-line')
                        iconEye.classList.add('ri-eye-off-line')
                    }
                })
            }
        }

        showHiddenPass('login-pass', 'login-eye')
    </script>
</body>
</html>
